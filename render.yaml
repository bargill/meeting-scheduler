# Render.com deployment configuration
# Deploy this as a Web Service on https://render.com
#
# IMPORTANT: You must also create a PostgreSQL database on Render
# and set the DATABASE_URL env var on the web service to the
# "Internal Database URL" from the PostgreSQL dashboard.

databases:
  - name: meeting-scheduler-db
    plan: free
    databaseName: meeting_scheduler

services:
  - type: web
    name: meeting-scheduler
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: meeting-scheduler-db
          property: connectionString
